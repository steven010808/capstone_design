app:
  name: multimodal-recsys
  random_seed: 42

server:
  api_port: 8000
  dashboard_port: 8501

redis:
  host: redis
  port: 6379
  db: 0

paths:
  data_dir: data/
  artifacts_dir: artifacts/

simulator:
  output_format: csv

  output:
    raw_dir: data/raw
    products_file: products.csv
    users_file: users.csv
    events_file: events.csv

  scale:
    users: 10000
    events: 1000000

  target_scale:
    users: 10000
    events: 1000000

  preference_noise:
    mode: blend_uniform
    strength: 0.18

  user_preference:
    top_k_categories: 2

  budget_adjustment_by_tier:
    low_price:
      min_multiplier: 0.90
      max_multiplier: 0.90
      min_floor: 10000
      max_floor: 120000
    mid_price:
      min_multiplier: 1.00
      max_multiplier: 1.00
      min_floor: 30000
      max_floor: 300000
    luxury:
      min_multiplier: 2.50
      max_multiplier: 5.00
      min_floor: 300000
      max_floor: 2500000

  catalog:
    source: external_hm

    external_hm:
      products_master_path: data/external/hm/processed/hm_products_master.csv
      low_price_max_quantile: 0.55
      mid_price_max_quantile: 0.97
      new_item_days_threshold: 30
      allowed_top_categories: [Ladieswear, Baby/Children, Divided, Menswear, Sport]

  personas:
    trendsetter:
      ratio: 0.12
      distribution_mode: prior_based
      category_prior:
        Divided: 0.40
        Ladieswear: 0.25
        Sport: 0.20
        Menswear: 0.10
        Baby/Children: 0.05
      price_sensitivity: 0.30
      base_conversion_rate: 0.07
      preferred_price_tiers: [mid_price, luxury]
      budget_min: 50000
      budget_max: 300000

    pragmatist:
      ratio: 0.20
      distribution_mode: price_based
      affordability_alpha: 0.70
      price_sensitivity: 0.55
      base_conversion_rate: 0.05
      preferred_price_tiers: [low_price, mid_price]
      budget_min: 30000
      budget_max: 150000

    value_seeker:
      ratio: 0.22
      distribution_mode: price_based
      affordability_alpha: 1.20
      price_sensitivity: 0.90
      base_conversion_rate: 0.04
      preferred_price_tiers: [low_price]
      budget_min: 10000
      budget_max: 100000

    top_category_loyalist:
      ratio: 0.14
      distribution_mode: top_category_anchor
      preferred_top_category_pool: [Ladieswear, Baby/Children, Divided, Menswear, Sport]
      price_sensitivity: 0.35
      base_conversion_rate: 0.08
      preferred_price_tiers: []
      budget_min: 80000
      budget_max: 500000

    impulse_buyer:
      ratio: 0.16
      distribution_mode: prior_based
      category_prior:
        Ladieswear: 0.30
        Divided: 0.30
        Sport: 0.20
        Menswear: 0.15
        Baby/Children: 0.05
      price_sensitivity: 0.35
      base_conversion_rate: 0.09
      preferred_price_tiers: [mid_price]
      budget_min: 40000
      budget_max: 200000

    careful_explorer:
      ratio: 0.16
      distribution_mode: prior_based
      category_prior:
        Ladieswear: 0.24
        Baby/Children: 0.18
        Divided: 0.18
        Menswear: 0.20
        Sport: 0.20
      price_sensitivity: 0.60
      base_conversion_rate: 0.03
      preferred_price_tiers: [low_price, mid_price]
      budget_min: 20000
      budget_max: 160000

  events:
    lookback_days: 30
    budget_tolerance_multiplier: 1.25

    query_pool:
      Ladieswear: [Dress, Trousers, Sweater, Blouse, Top, Bra, Skirt, Jacket]
      Baby/Children: [Trousers, T-shirt, Sweater, Dress, Shorts, Jacket, Garment Set, Leggings/Tights]
      Divided: [Dress, Sweater, Trousers, T-shirt, Skirt, Vest top, Jacket, Blouse]
      Menswear: [Trousers, Sweater, T-shirt, Shirt, Shorts, Hoodie, Jacket, Polo shirt]
      Sport: [T-shirt, Leggings/Tights, Vest top, Trousers, Bra, Shorts, Top, Hoodie]




##retailrocket 데이터셋 기준 (동일 session은 30분 단위로다가 설정)
## session 구분 30분 단위는 실재 reatailrocket을 사용한 논문 https://arxiv.org/pdf/2404.00261, 및 google analytics의 가이드라인을 따름

##view_to_cart = 0.0221
##cart_to_purchase = 0.2717
##direct_purchase_from_view = 0.0010

##이를 반영하여 persona에 맞게 변경

##trendsetter: 0.24/0.34/0.06 → 0.06/0.34/0.005
##pragmatist: 0.16/0.28/0.03 → 0.035/0.28/0.002
##value_seeker: 0.18/0.24/0.02 → 0.03/0.24/0.0015
##top_category_loyalist: 0.26/0.38/0.05 → 0.055/0.36/0.004
##impulse_buyer: 0.31/0.42/0.09 → 0.08/0.40/0.008
##careful_explorer: 0.12/0.20/0.02 → 0.02/0.20/0.001

    transition_prob:
      trendsetter:
        view_to_cart: 0.075
        cart_to_purchase: 0.350
        direct_purchase_from_view: 0.007

      pragmatist:
        view_to_cart: 0.045
        cart_to_purchase: 0.290
        direct_purchase_from_view: 0.003

      value_seeker:
        view_to_cart: 0.038
        cart_to_purchase: 0.245
        direct_purchase_from_view: 0.002

      top_category_loyalist:
        view_to_cart: 0.070
        cart_to_purchase: 0.370
        direct_purchase_from_view: 0.006

      impulse_buyer:
        view_to_cart: 0.095
        cart_to_purchase: 0.420
        direct_purchase_from_view: 0.012

      careful_explorer:
        view_to_cart: 0.028
        cart_to_purchase: 0.205
        direct_purchase_from_view: 0.0015

    views_per_session_by_persona:
      trendsetter: [3, 5]
      pragmatist: [1, 3]
      value_seeker: [2, 4]
      top_category_loyalist: [2, 4]
      impulse_buyer: [1, 3]
      careful_explorer: [4, 6]

  split:
    train_ratio: 0.8
    valid_ratio: 0.1
    test_ratio: 0.1
    time_based: true