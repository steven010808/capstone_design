app:
  name: multimodal-recsys
  random_seed: 42

server:
  api_port: 8000
  dashboard_port: 8501

redis:
  host: redis
  port: 6379
  db: 0

paths:
  data_dir: data/
  artifacts_dir: artifacts/

simulator:
  output_format: csv

  scale:
    products: 1000
    users: 200
    events: 5000

  target_scale:
    products: 50000
    users: 10000
    events: 1000000

  preference_noise:
    mode: blend_uniform
    strength: 0.18

  user_preference:
    top_k_categories: 2

  favorite_brand_sampling:
    mode: uniform

  budget_adjustment_by_tier:
    low_price:
      min_multiplier: 0.90
      max_multiplier: 0.90
      min_floor: 10000
      max_floor: 120000
    mid_price:
      min_multiplier: 1.00
      max_multiplier: 1.00
      min_floor: 30000
      max_floor: 300000
    luxury:
      min_multiplier: 2.50
      max_multiplier: 5.00
      min_floor: 300000
      max_floor: 2500000

  catalog:
    structure:
      의류:
        상의: [후드티, 니트, 셔츠, 맨투맨]
        하의: [데님, 슬랙스, 조거팬츠, 쇼츠]
        아우터: [패딩, 코트, 자켓, 가디건]
      신발:
        스니커즈: [러닝화, 캔버스화, 농구화]
        부츠: [워커, 첼시부츠]
        샌들: [슬리퍼, 스포츠샌들]
      액세서리:
        가방: [백팩, 크로스백, 토트백]
        모자: [볼캡, 비니]
        기타: [벨트, 머플러, 지갑]

    leaf_category_base_price:
      후드티: {min: 39000, max: 109000}
      니트: {min: 49000, max: 149000}
      셔츠: {min: 39000, max: 129000}
      맨투맨: {min: 39000, max: 99000}
      데님: {min: 49000, max: 139000}
      슬랙스: {min: 49000, max: 129000}
      조거팬츠: {min: 39000, max: 99000}
      쇼츠: {min: 29000, max: 79000}
      패딩: {min: 149000, max: 349000}
      코트: {min: 129000, max: 299000}
      자켓: {min: 99000, max: 249000}
      가디건: {min: 59000, max: 159000}
      러닝화: {min: 79000, max: 179000}
      캔버스화: {min: 49000, max: 109000}
      농구화: {min: 109000, max: 229000}
      워커: {min: 89000, max: 199000}
      첼시부츠: {min: 99000, max: 219000}
      슬리퍼: {min: 19000, max: 69000}
      스포츠샌들: {min: 39000, max: 99000}
      백팩: {min: 59000, max: 189000}
      크로스백: {min: 49000, max: 169000}
      토트백: {min: 69000, max: 199000}
      볼캡: {min: 29000, max: 69000}
      비니: {min: 25000, max: 59000}
      벨트: {min: 29000, max: 99000}
      머플러: {min: 39000, max: 119000}
      지갑: {min: 49000, max: 159000}

    brand_catalog:
      MUSINSA_STANDARD:
        tier: low_price
        multiplier_min: 0.85
        multiplier_max: 1.00
        discount_max: 0.40
        sampling_weight: 16
      SPAO:
        tier: low_price
        multiplier_min: 0.80
        multiplier_max: 0.95
        discount_max: 0.45
        sampling_weight: 14

      NIKE:
        tier: mid_price
        multiplier_min: 1.10
        multiplier_max: 1.90
        discount_max: 0.30
        sampling_weight: 12
      ADIDAS:
        tier: mid_price
        multiplier_min: 1.00
        multiplier_max: 1.70
        discount_max: 0.30
        sampling_weight: 10
      COVERNAT:
        tier: mid_price
        multiplier_min: 0.95
        multiplier_max: 1.30
        discount_max: 0.35
        sampling_weight: 10
      THISISNEVERTHAT:
        tier: mid_price
        multiplier_min: 1.00
        multiplier_max: 1.35
        discount_max: 0.25
        sampling_weight: 8
      MLB:
        tier: mid_price
        multiplier_min: 1.00
        multiplier_max: 1.50
        discount_max: 0.30
        sampling_weight: 8
      DISCOVERY:
        tier: mid_price
        multiplier_min: 1.00
        multiplier_max: 1.40
        discount_max: 0.30
        sampling_weight: 7
      MATIN_KIM:
        tier: mid_price
        multiplier_min: 1.10
        multiplier_max: 1.60
        discount_max: 0.20
        sampling_weight: 5

      BURBERRY:
        tier: luxury
        multiplier_min: 8.00
        multiplier_max: 12.00
        discount_max: 0.12
        sampling_weight: 2
      MONCLER:
        tier: luxury
        multiplier_min: 10.00
        multiplier_max: 15.00
        discount_max: 0.10
        sampling_weight: 1

    brand_category_affinity:
      MUSINSA_STANDARD: {의류: 0.70, 신발: 0.10, 액세서리: 0.20}
      SPAO: {의류: 0.80, 신발: 0.05, 액세서리: 0.15}
      NIKE: {의류: 0.35, 신발: 0.50, 액세서리: 0.15}
      ADIDAS: {의류: 0.35, 신발: 0.50, 액세서리: 0.15}
      COVERNAT: {의류: 0.65, 신발: 0.15, 액세서리: 0.20}
      THISISNEVERTHAT: {의류: 0.60, 신발: 0.20, 액세서리: 0.20}
      MLB: {의류: 0.35, 신발: 0.35, 액세서리: 0.30}
      DISCOVERY: {의류: 0.55, 신발: 0.25, 액세서리: 0.20}
      MATIN_KIM: {의류: 0.50, 신발: 0.10, 액세서리: 0.40}
      BURBERRY: {의류: 0.45, 신발: 0.05, 액세서리: 0.50}
      MONCLER: {의류: 0.85, 신발: 0.05, 액세서리: 0.10}

    colors: [black, white, gray, navy, beige, brown, green]
    style_tags: [casual, street, minimal, sporty, formal, outdoor]

  personas:
    trendsetter:
      ratio: 0.12
      distribution_mode: prior_based
      category_prior: {의류: 0.45, 신발: 0.20, 액세서리: 0.35}
      price_sensitivity: 0.30
      base_conversion_rate: 0.07
      preferred_brand_tiers: [mid_price, luxury]
      budget_min: 50000
      budget_max: 300000

    pragmatist:
      ratio: 0.20
      distribution_mode: price_based
      affordability_alpha: 0.70
      price_sensitivity: 0.55
      base_conversion_rate: 0.05
      preferred_brand_tiers: [low_price, mid_price]
      budget_min: 30000
      budget_max: 150000

    value_seeker:
      ratio: 0.22
      distribution_mode: price_based
      affordability_alpha: 1.20
      price_sensitivity: 0.90
      base_conversion_rate: 0.04
      preferred_brand_tiers: [low_price]
      budget_min: 10000
      budget_max: 100000

    brand_loyalist:
      ratio: 0.14
      distribution_mode: brand_anchor
      favorite_brand_pool: [NIKE, ADIDAS, MLB, BURBERRY, MONCLER]
      price_sensitivity: 0.35
      base_conversion_rate: 0.08
      preferred_brand_tiers: []
      budget_min: 80000
      budget_max: 500000

    impulse_buyer:
      ratio: 0.16
      distribution_mode: prior_based
      category_prior: {의류: 0.45, 신발: 0.35, 액세서리: 0.20}
      price_sensitivity: 0.35
      base_conversion_rate: 0.09
      preferred_brand_tiers: [mid_price]
      budget_min: 40000
      budget_max: 200000

    careful_explorer:
      ratio: 0.16
      distribution_mode: prior_based
      category_prior: {의류: 0.34, 신발: 0.33, 액세서리: 0.33}
      price_sensitivity: 0.60
      base_conversion_rate: 0.03
      preferred_brand_tiers: [low_price, mid_price]
      budget_min: 20000
      budget_max: 160000

  split:
    train_ratio: 0.8
    valid_ratio: 0.1
    test_ratio: 0.1
    time_based: true