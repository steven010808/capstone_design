app:
  name: multimodal-recsys
  random_seed: 42

server:
  api_port: 8000
  dashboard_port: 8501

redis:
  host: redis
  port: 6379
  db: 0

paths:
  data_dir: data/
  artifacts_dir: artifacts/

simulator:
  output_format: csv

  output:
    raw_dir: data/raw
    products_file: products.csv
    users_file: users.csv
    events_file: events.csv

  scale:
    products: 5000
    users: 1000
    events: 10000

  target_scale:
    products: 50000
    users: 10000
    events: 1000000

  preference_noise:
    mode: blend_uniform
    strength: 0.18

  user_preference:
    top_k_categories: 2

  budget_adjustment_by_tier:
    low_price:
      min_multiplier: 0.90
      max_multiplier: 0.90
      min_floor: 10000
      max_floor: 120000
    mid_price:
      min_multiplier: 1.00
      max_multiplier: 1.00
      min_floor: 30000
      max_floor: 300000
    luxury:
      min_multiplier: 2.50
      max_multiplier: 5.00
      min_floor: 300000
      max_floor: 2500000

  catalog:
    source: external_hm

    external_hm:
      products_master_path: data/external/hm/processed/hm_products_master.csv
      low_price_max_quantile: 0.55
      mid_price_max_quantile: 0.97
      new_item_days_threshold: 30
      allowed_top_categories: [Ladieswear, Baby/Children, Divided, Menswear, Sport]

  personas:
    trendsetter:
      ratio: 0.12
      distribution_mode: prior_based
      category_prior:
        Divided: 0.40
        Ladieswear: 0.25
        Sport: 0.20
        Menswear: 0.10
        Baby/Children: 0.05
      price_sensitivity: 0.30
      base_conversion_rate: 0.07
      preferred_price_tiers: [mid_price, luxury]
      budget_min: 50000
      budget_max: 300000

    pragmatist:
      ratio: 0.20
      distribution_mode: price_based
      affordability_alpha: 0.70
      price_sensitivity: 0.55
      base_conversion_rate: 0.05
      preferred_price_tiers: [low_price, mid_price]
      budget_min: 30000
      budget_max: 150000

    value_seeker:
      ratio: 0.22
      distribution_mode: price_based
      affordability_alpha: 1.20
      price_sensitivity: 0.90
      base_conversion_rate: 0.04
      preferred_price_tiers: [low_price]
      budget_min: 10000
      budget_max: 100000

    top_category_loyalist:
      ratio: 0.14
      distribution_mode: top_category_anchor
      preferred_top_category_pool: [Ladieswear, Baby/Children, Divided, Menswear, Sport]
      price_sensitivity: 0.35
      base_conversion_rate: 0.08
      preferred_price_tiers: []
      budget_min: 80000
      budget_max: 500000

    impulse_buyer:
      ratio: 0.16
      distribution_mode: prior_based
      category_prior:
        Ladieswear: 0.30
        Divided: 0.30
        Sport: 0.20
        Menswear: 0.15
        Baby/Children: 0.05
      price_sensitivity: 0.35
      base_conversion_rate: 0.09
      preferred_price_tiers: [mid_price]
      budget_min: 40000
      budget_max: 200000

    careful_explorer:
      ratio: 0.16
      distribution_mode: prior_based
      category_prior:
        Ladieswear: 0.24
        Baby/Children: 0.18
        Divided: 0.18
        Menswear: 0.20
        Sport: 0.20
      price_sensitivity: 0.60
      base_conversion_rate: 0.03
      preferred_price_tiers: [low_price, mid_price]
      budget_min: 20000
      budget_max: 160000

  events:
    lookback_days: 30
    budget_tolerance_multiplier: 1.25

    query_pool:
      Ladieswear: [Dress, Trousers, Sweater, Blouse, Top, Bra, Skirt, Jacket]
      Baby/Children: [Trousers, T-shirt, Sweater, Dress, Shorts, Jacket, Garment Set, Leggings/Tights]
      Divided: [Dress, Sweater, Trousers, T-shirt, Skirt, Vest top, Jacket, Blouse]
      Menswear: [Trousers, Sweater, T-shirt, Shirt, Shorts, Hoodie, Jacket, Polo shirt]
      Sport: [T-shirt, Leggings/Tights, Vest top, Trousers, Bra, Shorts, Top, Hoodie]

    transition_prob:
      trendsetter:
        view_to_cart: 0.24
        cart_to_purchase: 0.34
        direct_purchase_from_view: 0.06
      pragmatist:
        view_to_cart: 0.16
        cart_to_purchase: 0.28
        direct_purchase_from_view: 0.03
      value_seeker:
        view_to_cart: 0.18
        cart_to_purchase: 0.24
        direct_purchase_from_view: 0.02
      top_category_loyalist:
        view_to_cart: 0.26
        cart_to_purchase: 0.38
        direct_purchase_from_view: 0.05
      impulse_buyer:
        view_to_cart: 0.31
        cart_to_purchase: 0.42
        direct_purchase_from_view: 0.09
      careful_explorer:
        view_to_cart: 0.12
        cart_to_purchase: 0.20
        direct_purchase_from_view: 0.02

    views_per_session_by_persona:
      trendsetter: [3, 6]
      pragmatist: [2, 4]
      value_seeker: [2, 5]
      top_category_loyalist: [2, 5]
      impulse_buyer: [2, 4]
      careful_explorer: [3, 6]

  split:
    train_ratio: 0.8
    valid_ratio: 0.1
    test_ratio: 0.1
    time_based: true